name: CI/CD + AppSec Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Unit Tests
        run: ./mvnw test

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: modules/api/target/*.jar

  # SAST - SpotBugs + Find Security Bugs (sem cadastro)
  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: SAST - SpotBugs + Find Security Bugs
        run: ./mvnw compile spotbugs:check -Dspotbugs.failOnError=false

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: "**/target/spotbugsXml.xml"

  # Detecção de Segredos - Gitleaks
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Detecção de Segredos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # SCA - OWASP Dependency-Check
  sca:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: "**/target/dependency-check-report.*"

  # Segurança de Containers - Trivy
  container-security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t wongola:${{ github.sha }} .

      - name: Trivy - Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wongola:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # DAST - OWASP ZAP
  dast:
    runs-on: ubuntu-latest
    needs: container-security
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Start App
        run: |
          ./mvnw clean package -DskipTests
          java -jar modules/api/target/*.jar &
          sleep 15

      - name: OWASP ZAP - DAST Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8080
          rules_file_name: .github/zap-rules.tsv
          allow_issue_writing: false

  # Trivy - Scan de IaC e filesystem
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
