name: CI/CD + AppSec Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wongola
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean install -DskipTests

      - name: Unit Tests
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: ./mvnw test

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: modules/api/target/*.jar

  # SAST - SpotBugs + Find Security Bugs
  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: SAST - SpotBugs + Find Security Bugs
        run: ./mvnw clean install -DskipTests && ./mvnw spotbugs:check -Dspotbugs.failOnError=false

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: "**/target/spotbugsXml.xml"

  # Detecção de Segredos - Gitleaks
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Detecção de Segredos
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --verbose

  # SCA - Trivy (análise de dependências)
  sca:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Resolve dependencies
        run: ./mvnw clean install -DskipTests

      - name: Trivy - SCA Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # Segurança de Containers - Trivy
  container-security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean install -DskipTests

      - name: Build Docker Image
        run: docker build -t wongola:${{ github.sha }} .

      - name: Trivy - Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wongola:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # DAST - OWASP ZAP
  dast:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wongola
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build & Start App
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: |
          ./mvnw clean install -DskipTests
          java -jar modules/api/target/*.jar &
          sleep 20
          curl -f http://localhost:8080/actuator/health || exit 1

      - name: OWASP ZAP - DAST Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080
          rules_file_name: .github/zap-rules.tsv
          allow_issue_writing: false

  # Trivy - Scan de IaC e filesystem
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Filesystem Scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs . --scanners misconfig,secret --severity CRITICAL,HIGH --format table --exit-code 0 --skip-dirs modules --skip-files pom.xml
