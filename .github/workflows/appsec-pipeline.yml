name: CI/CD + AppSec Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean install -DskipTests

      - name: Unit Tests
        run: ./mvnw test

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: modules/api/target/*.jar

  # SAST - SpotBugs + Find Security Bugs
  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: SAST - SpotBugs + Find Security Bugs
        run: ./mvnw clean install -DskipTests && ./mvnw spotbugs:check -Dspotbugs.failOnError=false

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: "**/target/spotbugsXml.xml"

  # Detecção de Segredos - Gitleaks (binário direto, sem licença)
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Detecção de Segredos
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --verbose

  # SCA - OWASP Dependency-Check
  sca:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: OWASP Dependency-Check
        run: |
          ./mvnw clean install -DskipTests
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: "**/target/dependency-check-report.*"

  # Segurança de Containers - Trivy
  container-security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean install -DskipTests

      - name: Build Docker Image
        run: docker build -t wongola:${{ github.sha }} .

      - name: Trivy - Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wongola:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # DAST - OWASP ZAP
  dast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build & Start App
        run: |
          ./mvnw clean install -DskipTests
          java -jar modules/api/target/*.jar &
          sleep 15

      - name: OWASP ZAP - DAST Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080
          rules_file_name: .github/zap-rules.tsv
          allow_issue_writing: false

  # Trivy - Scan de IaC e filesystem
  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Resolve dependencies (populate local cache)
        run: ./mvnw clean install -DskipTests

      - name: Trivy - Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
